[workspace]
members = [
    "crates/battle-application",
    "crates/battle-domain",
    "crates/battle-vsh-adapter",
    "crates/game-e2e",
    "crates/game-host",
    "crates/game-ui",
]
resolver = "2"

[workspace.package]
edition = "2024"
license = "MIT"
rust-version = "1.88"

[workspace.dependencies]
punctum-gpu = { path = "../punctum/crates/punctum-gpu" }
punctum-grid = { path = "../punctum/crates/punctum-grid" }
punctum-input = { path = "../punctum/crates/punctum-input" }
vsh-core = { path = "../../packages/vsh/crates/vsh-core" }

