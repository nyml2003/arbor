<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Capture Toast</title>
    <script
      type="module"
      src="/src/toast/main.ts"
    ></script>
  </head>
  <body>
    <div
      id="toast"
      class="toast"
    >
      <button
        id="toastClose"
        class="toastClose"
        type="button"
        aria-label="关闭通知"
      >
        ×
      </button>
      <button
        id="toastOpen"
        class="toastOpen"
        type="button"
      >
        <span class="toastLabel">Capture</span>
        <span
          id="toastMessage"
          class="toastMessage"
        >
          截图已完成
        </span>
        <span class="toastHint">点击打开图片</span>
      </button>
    </div>
  </body>
</html>
